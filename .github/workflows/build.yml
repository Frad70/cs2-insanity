# GitHub Actions CI for cs2-insanity.
#
# Triggers on every push to main + every PR + every v*-tag. Goal: catch
# compile-fails on both halves of the stack before they hit the live server.
# Does NOT actually deploy — that's still manual via scripts/deploy.sh.
#
# Two parallel build jobs:
#   build-cssharp  — InsanityRevive (C# / .NET 8 / CSSharp). Builds twice
#                    and compares sha256 to enforce reproducibility (the
#                    "DLL drift" failure mode that bit v0.6.0.7→0.8 and
#                    v0.6.0.10→0.11 — see scripts/deploy.sh comments).
#   build-hider    — InsanityHider (C++ / Metamod:Source / CS2 SDK).
#
# A `package` job runs on tag pushes only. It assembles a server-relative
# tarball, attaches it to a GitHub Release, and marks pre-release on tags
# that contain a hyphen (e.g. v0.7.2-beta).
#
# Caches:
#   - NuGet packages (~/.nuget/packages) keyed on csproj hash.
#   - hl2sdk + metamod-source clones, keyed on branch + workflow hash so
#     touching the workflow invalidates them.

name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CSSHARP_VERSION: "1.0.367"
  HL2SDK_REPO: "https://github.com/alliedmodders/hl2sdk.git"
  HL2SDK_BRANCH: "cs2"
  MMSOURCE_REPO: "https://github.com/alliedmodders/metamod-source.git"
  MMSOURCE_BRANCH: "master"

jobs:
  build-cssharp:
    name: InsanityRevive (.NET / CSSharp)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Fetch CounterStrikeSharp.API.dll (v${{ env.CSSHARP_VERSION }})
        run: |
          mkdir -p .ci/cssharp-api
          url="https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-linux-${CSSHARP_VERSION}.zip"
          curl -fsSL --retry 4 --retry-delay 4 -o /tmp/cssharp.zip "$url"
          unzip -o -q /tmp/cssharp.zip -d /tmp/cssharp/
          api_dll=$(find /tmp/cssharp -name 'CounterStrikeSharp.API.dll' | head -1)
          [ -n "$api_dll" ] || { echo "API dll not found in zip" >&2; exit 1; }
          cp "$api_dll" .ci/cssharp-api/CounterStrikeSharp.API.dll

      - name: dotnet restore
        run: dotnet restore InsanityRevive/InsanityRevive.csproj

      - name: dotnet build (Release, warnings-as-errors) — pass 1
        run: |
          dotnet build InsanityRevive/InsanityRevive.csproj \
            -c Release \
            --no-restore \
            -warnaserror \
            --nologo \
            -p:CSSharpApiPath="${{ github.workspace }}/.ci/cssharp-api/CounterStrikeSharp.API.dll"

      - name: Capture pass-1 sha256 + stash DLL
        run: |
          dll=InsanityRevive/bin/Release/net8.0/InsanityRevive.dll
          [ -f "$dll" ] || { echo "DLL missing post-build" >&2; exit 1; }
          sha1=$(sha256sum "$dll" | awk '{print $1}')
          echo "Pass-1 DLL sha256: $sha1"
          echo "DLL_SHA256=$sha1" >> "$GITHUB_ENV"
          mkdir -p .ci/pass1
          cp "$dll" .ci/pass1/InsanityRevive.dll

      - name: Determinism guard — clean rebuild + compare
        run: |
          # Wipe build outputs so MSBuild can't reuse cached intermediates.
          rm -rf InsanityRevive/bin InsanityRevive/obj
          dotnet build InsanityRevive/InsanityRevive.csproj \
            -c Release \
            -warnaserror \
            --nologo \
            -p:CSSharpApiPath="${{ github.workspace }}/.ci/cssharp-api/CounterStrikeSharp.API.dll"
          dll=InsanityRevive/bin/Release/net8.0/InsanityRevive.dll
          sha2=$(sha256sum "$dll" | awk '{print $1}')
          echo "Pass-2 DLL sha256: $sha2"
          if [ "$sha2" != "$DLL_SHA256" ]; then
            echo "::error::DLL hash drifted between clean rebuilds: $DLL_SHA256 -> $sha2" >&2
            echo "Determinism is broken — investigate before deploying." >&2
            exit 1
          fi
          echo "✓ deterministic ($sha2)"

      - name: Upload InsanityRevive artifact
        uses: actions/upload-artifact@v4
        with:
          name: InsanityRevive-${{ github.sha }}
          path: |
            InsanityRevive/bin/Release/net8.0/InsanityRevive.dll
            InsanityRevive/bin/Release/net8.0/InsanityRevive.pdb
            InsanityRevive/cfg/**
            InsanityRevive/gamedata/**
          retention-days: 14

  build-paints:
    name: InsanityPaints (.NET / CSSharp)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Fetch CounterStrikeSharp.API.dll (v${{ env.CSSHARP_VERSION }})
        run: |
          mkdir -p .ci/cssharp-api
          url="https://github.com/roflmuffin/CounterStrikeSharp/releases/download/v${CSSHARP_VERSION}/counterstrikesharp-linux-${CSSHARP_VERSION}.zip"
          curl -fsSL --retry 4 --retry-delay 4 -o /tmp/cssharp.zip "$url"
          unzip -o -q /tmp/cssharp.zip -d /tmp/cssharp/
          api_dll=$(find /tmp/cssharp -name 'CounterStrikeSharp.API.dll' | head -1)
          [ -n "$api_dll" ] || { echo "API dll not found in zip" >&2; exit 1; }
          cp "$api_dll" .ci/cssharp-api/CounterStrikeSharp.API.dll

      - name: dotnet restore
        run: dotnet restore InsanityPaints/InsanityPaints.csproj

      - name: dotnet build (Release, warnings-as-errors) — pass 1
        run: |
          dotnet build InsanityPaints/InsanityPaints.csproj \
            -c Release \
            --no-restore \
            -warnaserror \
            --nologo \
            -p:CSSharpApiPath="${{ github.workspace }}/.ci/cssharp-api/CounterStrikeSharp.API.dll"

      - name: Capture pass-1 sha256 + stash DLL
        run: |
          dll=InsanityPaints/bin/Release/net8.0/InsanityPaints.dll
          [ -f "$dll" ] || { echo "DLL missing post-build" >&2; exit 1; }
          sha1=$(sha256sum "$dll" | awk '{print $1}')
          echo "Pass-1 DLL sha256: $sha1"
          echo "PAINTS_DLL_SHA256=$sha1" >> "$GITHUB_ENV"
          mkdir -p .ci/pass1-paints
          cp "$dll" .ci/pass1-paints/InsanityPaints.dll

      - name: Determinism guard — clean rebuild + compare
        run: |
          rm -rf InsanityPaints/bin InsanityPaints/obj
          dotnet build InsanityPaints/InsanityPaints.csproj \
            -c Release \
            -warnaserror \
            --nologo \
            -p:CSSharpApiPath="${{ github.workspace }}/.ci/cssharp-api/CounterStrikeSharp.API.dll"
          dll=InsanityPaints/bin/Release/net8.0/InsanityPaints.dll
          sha2=$(sha256sum "$dll" | awk '{print $1}')
          echo "Pass-2 DLL sha256: $sha2"
          if [ "$sha2" != "$PAINTS_DLL_SHA256" ]; then
            echo "::error::DLL hash drifted between clean rebuilds: $PAINTS_DLL_SHA256 -> $sha2" >&2
            echo "Determinism is broken — investigate before deploying." >&2
            exit 1
          fi
          echo "✓ deterministic ($sha2)"

      - name: Upload InsanityPaints artifact
        uses: actions/upload-artifact@v4
        with:
          name: InsanityPaints-${{ github.sha }}
          path: |
            InsanityPaints/bin/Release/net8.0/InsanityPaints.dll
            InsanityPaints/bin/Release/net8.0/InsanityPaints.pdb
            InsanityPaints/bin/Release/net8.0/wwwroot/**
            InsanityPaints/configs/**
            InsanityPaints/gamedata/**
          retention-days: 14

  build-hider:
    name: InsanityHider (C++ / Metamod / CS2 SDK)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make

      - name: Cache hl2sdk clone
        id: cache-hl2sdk
        uses: actions/cache@v4
        with:
          path: InsanityHider/hl2sdk
          key: hl2sdk-${{ env.HL2SDK_BRANCH }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Cache metamod-source clone
        id: cache-mmsource
        uses: actions/cache@v4
        with:
          path: InsanityHider/mmsource
          key: mmsource-${{ env.MMSOURCE_BRANCH }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Vendor hl2sdk (${{ env.HL2SDK_BRANCH }} branch)
        if: steps.cache-hl2sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$HL2SDK_BRANCH" \
            "$HL2SDK_REPO" InsanityHider/hl2sdk

      - name: Vendor metamod-source (${{ env.MMSOURCE_BRANCH }} branch)
        if: steps.cache-mmsource.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$MMSOURCE_BRANCH" \
            "$MMSOURCE_REPO" InsanityHider/mmsource

      - name: Ensure protoc is executable
        run: chmod +x InsanityHider/hl2sdk/devtools/bin/linux/protoc || true

      - name: make
        working-directory: InsanityHider
        run: |
          make -j"$(nproc)"

      - name: Compute and surface .so sha256
        run: |
          so=InsanityHider/build/insanityhider.so
          [ -f "$so" ] || { echo ".so missing post-build" >&2; exit 1; }
          sha=$(sha256sum "$so" | awk '{print $1}')
          echo "SO sha256: $sha"
          echo "SO_SHA256=$sha" >> "$GITHUB_ENV"

      - name: Upload InsanityHider artifact
        uses: actions/upload-artifact@v4
        with:
          name: InsanityHider-${{ github.sha }}
          path: |
            InsanityHider/build/insanityhider.so
            InsanityHider/insanityhider.vdf
          retention-days: 14

  package:
    name: package + release
    runs-on: ubuntu-latest
    needs: [build-cssharp, build-paints, build-hider]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 5
    permissions:
      contents: write   # required by softprops/action-gh-release
    steps:
      - uses: actions/checkout@v4

      - name: Download InsanityRevive artifact
        uses: actions/download-artifact@v4
        with:
          name: InsanityRevive-${{ github.sha }}
          path: out/cssharp

      - name: Download InsanityPaints artifact
        uses: actions/download-artifact@v4
        with:
          name: InsanityPaints-${{ github.sha }}
          path: out/paints

      - name: Download InsanityHider artifact
        uses: actions/download-artifact@v4
        with:
          name: InsanityHider-${{ github.sha }}
          path: out/hider

      - name: Stage server-relative tree
        run: |
          set -eu
          tag=${GITHUB_REF##*/}
          root=stage/cs2-insanity-${tag}

          # upload-artifact@v4 strips the LCD path prefix from uploads, so:
          #   out/cssharp/bin/Release/net8.0/InsanityRevive.dll
          #   out/cssharp/cfg/, out/cssharp/gamedata/
          #   out/paints/bin/Release/net8.0/InsanityPaints.dll
          #   out/paints/configs/
          #   out/hider/build/insanityhider.so
          #   out/hider/insanityhider.vdf

          # CSSharp side: csgo/addons/counterstrikesharp/plugins/InsanityRevive/
          plug_dir=$root/csgo/addons/counterstrikesharp/plugins/InsanityRevive
          mkdir -p "$plug_dir"
          cp out/cssharp/bin/Release/net8.0/InsanityRevive.dll "$plug_dir/"
          cp out/cssharp/bin/Release/net8.0/InsanityRevive.pdb "$plug_dir/" || true
          cp -r out/cssharp/cfg "$plug_dir/"
          cp -r out/cssharp/gamedata "$plug_dir/"

          # CSSharp side (paints): plugins/InsanityPaints/ + configs/plugins/InsanityPaints/
          # gamedata sits inside the plugin dir — CSSharp picks it up
          # automatically from plugins/<name>/gamedata/ (same convention
          # as InsanityRevive). wwwroot/ is the web-panel UI; WebServer
          # resolves it relative to ModuleDirectory at runtime.
          paints_plug=$root/csgo/addons/counterstrikesharp/plugins/InsanityPaints
          paints_cfg=$root/csgo/addons/counterstrikesharp/configs/plugins/InsanityPaints
          mkdir -p "$paints_plug" "$paints_cfg"
          cp out/paints/bin/Release/net8.0/InsanityPaints.dll "$paints_plug/"
          cp out/paints/bin/Release/net8.0/InsanityPaints.pdb "$paints_plug/" || true
          cp -r out/paints/bin/Release/net8.0/wwwroot "$paints_plug/"
          cp -r out/paints/gamedata "$paints_plug/"
          cp -r out/paints/configs/. "$paints_cfg/"

          # Metamod side: csgo/addons/metamod/{bin/linuxsteamrt64,*.vdf}
          mm_bin=$root/csgo/addons/metamod/bin/linuxsteamrt64
          mm_dir=$root/csgo/addons/metamod
          mkdir -p "$mm_bin" "$mm_dir"
          cp out/hider/build/insanityhider.so "$mm_bin/"
          cp out/hider/insanityhider.vdf "$mm_dir/"

      - name: Tarball + sha256
        id: bundle
        run: |
          tag=${GITHUB_REF##*/}
          tar -czf "cs2-insanity-${tag}.tar.gz" -C stage "cs2-insanity-${tag}"
          sha256sum "cs2-insanity-${tag}.tar.gz" | tee "cs2-insanity-${tag}.tar.gz.sha256"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2-insanity-${{ github.ref_name }}
          path: |
            cs2-insanity-*.tar.gz
            cs2-insanity-*.tar.gz.sha256
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # All current tags are -beta / -alpha. A hyphenated tag is
          # treated as pre-release; clean tags like v1.0.0 publish as
          # full releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            cs2-insanity-*.tar.gz
            cs2-insanity-*.tar.gz.sha256
