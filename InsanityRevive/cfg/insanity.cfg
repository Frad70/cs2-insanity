// InsanityRevive FakeClient-base v3 — runtime config
// Hot-reloaded on map start; values persist across mapchange.

insanity_default_bot_count "5"
insanity_log_level "info"
insanity_telemetry_path "addons/counterstrikesharp/logs/insanity/{date}_{session}.jsonl"

// BotNavIgnore byte-patch lets bot_add work on maps without navmesh.
// Patch byte / signature anchor are version-fragile — leave OFF until
// you verify on the current CS2 build via a dev iteration. Default 0
// avoids crashing on engine versions where the patch lands in a
// different instruction boundary.
insanity_apply_botnav_patch "0"
